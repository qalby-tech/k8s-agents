#cloud-config
# Ubuntu DESKTOP GUI target for the AI daemon fleet (KubeVirt cloudInitNoCloud userData).
#
# Provisions three things:
#   1. SSH access for the fleet daemon (its pubkey -> ubuntu's authorized_keys).
#   2. The cua Computer Server bound to 127.0.0.1:8000 (never on the network; the
#      daemon reaches it via `ssh <vm> curl 127.0.0.1:8000/cmd`).
#   3. An AUTOLOGIN X11 desktop session for the server to act on — without a real
#      logged-in session, clicks/screenshots have nothing to target.
#
# Assumes a desktop image (ubuntu-desktop + gdm3) and user `ubuntu`.
# The operator substitutes {{DAEMON_PUBKEY}} before applying.

users:
  - name: ubuntu
    groups: [sudo]
    shell: /bin/bash
    lock_passwd: false
    ssh_authorized_keys:
      - {{DAEMON_PUBKEY}}

package_update: true
packages:
  - python3-pip
  - pipx
  - scrot              # Pillow ImageGrab backend on X11
  - gnome-screenshot   # fallback screenshot backend
  - python3-xlib       # pynput X11 input backend
  - xdotool            # debug / fallback input

write_files:
  # Force X11 + autologin. pynput input and Pillow ImageGrab are reliable on X11;
  # a Wayland session is NOT reliably driveable, so we disable it.
  - path: /etc/gdm3/custom.conf
    content: |
      [daemon]
      WaylandEnable=false
      AutomaticLoginEnable=true
      AutomaticLogin=ubuntu

  # FRAGILE BIT: discover the active session's DISPLAY + Xauthority at (re)start.
  # The autologin session's Xauthority path varies; probe the common locations.
  - path: /usr/local/bin/cua-server-start
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -eu
      export DISPLAY="${DISPLAY:-:0}"
      uid="$(id -u ubuntu)"
      for xa in \
        "/run/user/${uid}/gdm/Xauthority" \
        /run/user/${uid}/.mutter-Xwaylandauth* \
        "/home/ubuntu/.Xauthority"; do
        [ -e "$xa" ] && { export XAUTHORITY="$xa"; break; }
      done
      exec /home/ubuntu/.local/bin/cua-computer-server --host 127.0.0.1 --port 8000

  - path: /etc/systemd/system/cua-computer-server.service
    content: |
      [Unit]
      Description=cua Computer Server (loopback) for AI daemon GUI control
      After=graphical.target systemd-user-sessions.service
      Wants=graphical.target
      [Service]
      User=ubuntu
      Environment=HOME=/home/ubuntu
      ExecStartPre=/bin/sleep 5
      ExecStart=/usr/local/bin/cua-server-start
      Restart=always
      RestartSec=3
      [Install]
      WantedBy=graphical.target

runcmd:
  # Install the server into ubuntu's user env (console script -> ~/.local/bin).
  - sudo -u ubuntu pipx install cua-computer-server || sudo -u ubuntu pip3 install --user --break-system-packages cua-computer-server
  - systemctl daemon-reload
  - systemctl enable cua-computer-server.service
  - systemctl restart gdm3 || true
  - systemctl start cua-computer-server.service || true

# Verify after boot:  ssh ubuntu@<vm> 'curl -s --json '\''{"command":"screenshot"}'\'' 127.0.0.1:8000/cmd | head -c 60'
