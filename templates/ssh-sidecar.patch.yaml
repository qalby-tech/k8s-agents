# What the operator/mutating-webhook injects into a pod annotated
#   agents.livellm.io/inject: "ssh"
# to turn it into a terminal fleet target. Shown as a strategic-merge patch.
#
# shareProcessNamespace lets the agent (via the sidecar) see and act on the
# WORKLOAD container's processes; mount shared volumes for filesystem access.
spec:
  shareProcessNamespace: true
  containers:
    - name: ssh-sidecar
      image: registry.local/ai-daemon-sshd:latest   # built from Dockerfile.sshd
      ports:
        - containerPort: 22
          name: ssh
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: false        # sshd drops to `agent` per-session
        capabilities:
          drop: ["ALL"]
      volumeMounts:
        - name: fleet-authorized-keys   # daemon pubkey, from the per-ns Secret
          mountPath: /etc/fleet
          readOnly: true
        - name: fleet-host-key          # operator-generated, pinned in daemon known_hosts
          mountPath: /etc/ssh/ssh_host_ed25519_key
          subPath: ssh_host_ed25519_key
          readOnly: true
  volumes:
    - name: fleet-authorized-keys
      secret:
        secretName: agent-ssh-<ns>      # .data."authorized_keys" = daemon pubkey
        items:
          - key: authorized_keys
            path: authorized_keys
    - name: fleet-host-key
      secret:
        secretName: target-hostkey-<pod>  # operator-generated per target
        defaultMode: 0600
        items:
          - key: ssh_host_ed25519_key
            path: ssh_host_ed25519_key
