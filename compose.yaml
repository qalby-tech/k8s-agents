# Local smoke test: build + run the opencode engine image (the per-VM AI daemon)
# on one host. In the platform the same image is deployed per-VM by tenant-
# operator (charts/agents) and driven through tenant-api — there is no separate
# controller; a master is just another engine pointed at other engines.
#
#   docker compose up --build
services:
  engine:
    build:
      context: .
      dockerfile: engines/opencode/Dockerfile
    ports:
      - "4096:4096"
    volumes:
      # Reuse the host's opencode credentials for local testing.
      - ${HOME}/.local/share/opencode/auth.json:/root/.local/share/opencode/auth.json:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4096/config"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
