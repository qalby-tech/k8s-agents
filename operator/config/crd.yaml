apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentfleets.agents.livellm.io
spec:
  group: agents.livellm.io
  names:
    kind: AgentFleet
    listKind: AgentFleetList
    plural: agentfleets
    singular: agentfleet
    shortNames: [af]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - { name: Engine, type: string, jsonPath: .spec.engine }
        - { name: Targets, type: integer, jsonPath: .status.targets }
        - { name: Ready, type: boolean, jsonPath: .status.ready }
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                engine:
                  type: string
                  description: Engine image suffix (e.g. "opencode", "claude").
                providerCredentialRef:
                  type: string
                  description: Secret name holding opencode auth.json.
                targetLabels:
                  type: object
                  additionalProperties: { type: string }
                  description: Selects pods in this namespace to enroll as fleet targets.
            status:
              type: object
              properties:
                targets: { type: integer }
                ready: { type: boolean }
