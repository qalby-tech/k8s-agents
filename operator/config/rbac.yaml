apiVersion: v1
kind: Namespace
metadata:
  name: agents-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-agents-operator
  namespace: agents-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-agents-operator
rules:
  - apiGroups: ["agents.livellm.io"]
    resources: [agentfleets]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["agents.livellm.io"]
    resources: [agentfleets/status]
    verbs: [get, update, patch]
  - apiGroups: ["apps"]
    resources: [deployments]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [secrets, configmaps, pods]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["networking.k8s.io"]
    resources: [networkpolicies]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-agents-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-agents-operator
subjects:
  - kind: ServiceAccount
    name: k8s-agents-operator
    namespace: agents-system
