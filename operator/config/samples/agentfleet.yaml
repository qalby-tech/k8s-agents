# Example: one AI daemon in namespace "demo" controlling every pod labelled
# agents.livellm.io/target=true. Pods opt in with labels; per-pod annotations
# (agents.livellm.io/kind|os|ssh-user) classify them (default terminal/linux/agent).
apiVersion: agents.livellm.io/v1alpha1
kind: AgentFleet
metadata:
  name: demo
  namespace: demo
spec:
  engine: opencode
  providerCredentialRef: opencode-auth   # Secret with key auth.json
  targetLabels:
    agents.livellm.io/target: "true"
